<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change</title>
</head>
<body>
    <form action="#">
        <input type="text" value="" id="text1" name="text1">
    </form>
    <script>
        const text1 = document.getElementById('text1');
        const ChangeText1 = () => {
            console.log('text1が変更されました。');
        };
        text1.addEventListener('change',ChangeText1,false);
    </script>
</body>
</html>
