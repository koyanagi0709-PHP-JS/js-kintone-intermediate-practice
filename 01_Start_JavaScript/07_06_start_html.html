<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mouseover</title>
    <style>
        #kintone {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 id="kintone">Kintone</h1>
    <script>
        const kintone = document.getElementById('kintone');
        kintone.addEventListener('mouseover',(event) => {
            console.log('kintoneがマウスオーバーされました。');
            console.log(event);
        },false)
    </script>
</body>
</html>
